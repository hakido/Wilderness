<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associates Master</title>
  <style>
    :root{color-scheme:dark;--ink:#f7f4ec;--muted:#aeb8aa;--panel:rgba(14,23,17,.84);--line:rgba(255,255,255,.14);--gold:#d6a83b;--gold-soft:rgba(214,168,59,.16);--r:8px}*{box-sizing:border-box}body{margin:0;min-height:100svh;background:linear-gradient(135deg,rgba(4,9,6,.98),rgba(14,24,17,.9)),url("https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1800&q=80") center/cover fixed;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}.shell{width:min(1450px,calc(100% - 28px));margin:0 auto;padding:14px 0}.nav{display:flex;justify-content:space-between;gap:16px;padding:4px 0 14px}.brand{font-weight:780}.links{display:flex;gap:14px;color:var(--muted);font-size:14px}.links a.active{color:var(--ink)}.panel{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);backdrop-filter:blur(22px);overflow:hidden}.hero{padding:22px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:clamp(34px,4.5vw,58px);line-height:.98;letter-spacing:-.055em}.muted{color:var(--muted);line-height:1.6;font-size:14px}.tools{display:grid;grid-template-columns:1fr 180px 180px;gap:10px;margin-top:18px}.tools input,.tools select{border:1px solid var(--line);border-radius:var(--r);background:rgba(0,0,0,.26);color:var(--ink);padding:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:14px}.card{border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.05);padding:14px}.card h2{margin:0 0 6px;font-size:18px}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:6px 8px;margin:6px 6px 0 0;color:var(--muted);font-size:12px}.fact{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);color:var(--muted);font-size:13px}.fact strong{color:var(--ink);text-align:right}@media(max-width:1000px){.grid,.tools{grid-template-columns:1fr}.links{display:none}}
  </style>
</head>
<body><main class="shell"><nav class="nav"><a class="brand" href="crm.html">Wild India Operator</a><div class="links"><a href="crm.html">CRM</a><a href="tour-ops.html">Tour ops</a><a class="active" href="associates.html">Associates</a><a href="hotels.html">Hotels</a></div></nav><section class="panel"><div class="hero"><p class="muted">Master associate list for everyone the operator can assign to a trip.</p><h1>Associates master</h1><div class="tools"><input id="search" placeholder="Search by name, city, skill..." /><select id="role"><option>All roles</option><option>Driver</option><option>Naturalist</option><option>Permit agent</option><option>Airport rep</option><option>Vehicle owner</option></select><select id="region"><option>All regions</option><option>Central India</option><option>Assam</option><option>Rajasthan</option><option>Delhi</option></select></div></div><div class="grid" id="grid"></div></section></main><script>
    const associates=[["Sanjay Patil","Driver","Central India","Nagpur, Tadoba, Pench","Innova Crysta","Photo groups, English basic","RC renewal due May"],["Meera Vyas","Naturalist","Central India","Kanha, Bandhavgarh","Lead naturalist","Tiger behavior, luxury guests","No back-to-back 10 day runs"],["Pranab Deka","Naturalist","Assam","Kaziranga, Nameri","Birding specialist","Rhinos, raptors, wetlands","Confirm range permits early"],["Imran Ali","Driver","Assam","Guwahati, Kaziranga","Tempo Traveller","Family groups, long drives","Night driving avoided"],["Ravi Singh","Naturalist","Rajasthan","Ranthambore","Senior guide","VIP handling, fort history","Limited January dates"],["Mahesh Pawar","Vehicle owner","Central India","Jabalpur, Bandhavgarh","Fleet supplier","Backup vehicles, driver rooms","Advance needed"],["Ritu Sharma","Airport rep","Delhi","Delhi airport","Meet and assist","VIP arrivals, baggage support","Needs flight manifest"],["Anil Chauhan","Permit agent","Central India","MP forest permits","Permit desk","Kanha, Pench, Bandhavgarh","Passport copies mandatory"]];
    function render(){const q=document.querySelector("#search").value.toLowerCase(),role=document.querySelector("#role").value,region=document.querySelector("#region").value;document.querySelector("#grid").innerHTML=associates.filter(a=>(role==="All roles"||a[1]===role)&&(region==="All regions"||a[2]===region)&&a.join(" ").toLowerCase().includes(q)).map(a=>`<article class="card"><h2>${a[0]}</h2><span class="tag">${a[1]}</span><span class="tag">${a[2]}</span><div class="fact"><span>Coverage</span><strong>${a[3]}</strong></div><div class="fact"><span>Asset</span><strong>${a[4]}</strong></div><div class="fact"><span>Strength</span><strong>${a[5]}</strong></div><div class="fact"><span>Ops note</span><strong>${a[6]}</strong></div></article>`).join("")}
    ["#search","#role","#region"].forEach(id=>document.querySelector(id).addEventListener("input",render));render();
  </script></body></html>
