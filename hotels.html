<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotels and Resorts Master</title>
  <style>
    :root{color-scheme:dark;--ink:#f7f4ec;--muted:#aeb8aa;--panel:rgba(14,23,17,.84);--line:rgba(255,255,255,.14);--gold:#d6a83b;--gold-soft:rgba(214,168,59,.16);--r:8px}*{box-sizing:border-box}body{margin:0;min-height:100svh;background:linear-gradient(135deg,rgba(4,9,6,.98),rgba(14,24,17,.9)),url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80") center/cover fixed;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}.shell{width:min(1450px,calc(100% - 28px));margin:0 auto;padding:14px 0}.nav{display:flex;justify-content:space-between;gap:16px;padding:4px 0 14px}.brand{font-weight:780}.links{display:flex;gap:14px;color:var(--muted);font-size:14px}.links a.active{color:var(--ink)}.panel{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);backdrop-filter:blur(22px);overflow:hidden}.hero{padding:22px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:clamp(34px,4.5vw,58px);line-height:.98;letter-spacing:-.055em}.muted{color:var(--muted);line-height:1.6;font-size:14px}.tools{display:grid;grid-template-columns:1fr 180px 180px;gap:10px;margin-top:18px}.tools input,.tools select{border:1px solid var(--line);border-radius:var(--r);background:rgba(0,0,0,.26);color:var(--ink);padding:12px}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left;vertical-align:top}.table th{color:var(--gold)}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:6px 8px;color:var(--muted);font-size:12px}.status{display:inline-block;border-radius:999px;background:var(--gold);color:#171206;padding:6px 8px;font-weight:760}.soft{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--ink)}@media(max-width:900px){.links{display:none}.tools{grid-template-columns:1fr}.table{min-width:900px}.scroll{overflow:auto}}
  </style>
</head>
<body><main class="shell"><nav class="nav"><a class="brand" href="crm.html">Wild India Operator</a><div class="links"><a href="crm.html">CRM</a><a href="tour-ops.html">Tour ops</a><a href="associates.html">Associates</a><a class="active" href="hotels.html">Hotels</a></div></nav><section class="panel"><div class="hero"><p class="muted">Master list of hotels and safari resorts by forest, package style, room policy, supplier contacts, and staff accommodation.</p><h1>Hotels and resorts master</h1><div class="tools"><input id="search" placeholder="Search hotel, location, contact..." /><select id="location"><option>All locations</option><option>Bandhavgarh</option><option>Kanha</option><option>Tadoba</option><option>Pench</option><option>Kaziranga</option><option>Ranthambore</option></select><select id="style"><option>All styles</option><option>Regular</option><option>Luxury</option></select></div></div><div class="scroll"><table class="table" id="table"></table></div></section></main><script>
    const hotels=[["Mahua Kothi","Bandhavgarh","Luxury","8 rooms held Oct 5-14","Lodge desk: Priya","Driver room on request","45 day release","Single supplement pending"],["Banjaar Tola","Kanha","Luxury","6 suites held Oct 5-14","Taj desk","Naturalist room on request","60 day release","VIP dietary form needed"],["Svasara Jungle Lodge","Tadoba","Luxury","4 rooms requested Mar 12-15","Reservations: Aditi","Driver room extra","30 day release","Photography group friendly"],["Tuli Tiger Corridor","Pench","Regular","5 rooms requested Mar 10-16","Sales: Manoj","Driver room included","21 day release","Meal plan confirmation due"],["Diphlu River Lodge","Kaziranga","Luxury","3 rooms Apr 8-12 confirmed","Lodge desk: Rima","Guide room extra","45 day release","Vegetarian notes sent"],["Aman-i-Khas","Ranthambore","Luxury","Buyout requested Jan 22-25","Aman sales","Staff rooms outside","90 day release","Corporate rooming list due"],["Pench Jungle Camp","Pench","Regular","Backup allocation open","Central desk","Driver room included","14 day release","Good for fixed departures"]];
    function render(){const q=document.querySelector("#search").value.toLowerCase(),loc=document.querySelector("#location").value,style=document.querySelector("#style").value;document.querySelector("#table").innerHTML=`<tr><th>Hotel/resort</th><th>Location</th><th>Style</th><th>Allocation</th><th>Contact</th><th>Staff rooms</th><th>Terms</th><th>Ops note</th></tr>`+hotels.filter(h=>(loc==="All locations"||h[1]===loc)&&(style==="All styles"||h[2]===style)&&h.join(" ").toLowerCase().includes(q)).map(h=>`<tr><td><strong>${h[0]}</strong></td><td>${h[1]}</td><td><span class="tag">${h[2]}</span></td><td>${h[3]}</td><td>${h[4]}</td><td>${h[5]}</td><td><span class="status ${h[6].includes("14")?"soft":""}">${h[6]}</span></td><td>${h[7]}</td></tr>`).join("")}
    ["#search","#location","#style"].forEach(id=>document.querySelector(id).addEventListener("input",render));render();
  </script></body></html>
