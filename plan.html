<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildlife Route Draft</title>
  <style>
    :root{color-scheme:dark;--ink:#f7f4ec;--muted:#aeb8aa;--leaf:#09100b;--line:rgba(255,255,255,.14);--panel:rgba(16,25,18,.78);--gold:#d6a83b;--gold-soft:rgba(214,168,59,.16);--r:8px}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;background:linear-gradient(115deg,rgba(9,16,11,.98),rgba(9,16,11,.78) 48%,rgba(9,16,11,.94)),url("https://images.unsplash.com/photo-1516426122078-c23e76319801?auto=format&fit=crop&w=1800&q=80") center/cover fixed;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}button{border:0;cursor:pointer}a{color:inherit;text-decoration:none}
    .shell{width:min(1440px,calc(100% - 28px));margin:0 auto;padding:14px 0}.nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:4px 0 14px}.brand{display:flex;align-items:center;gap:10px;font-weight:780}.mark{display:grid;width:34px;height:34px;place-items:center;border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.08);color:var(--gold)}.links{display:flex;gap:14px;color:var(--muted);font-size:14px}.links a.active{color:var(--ink)}
    .app{display:grid;grid-template-columns:330px minmax(0,1fr) 320px;gap:14px;min-height:calc(100svh - 72px)}.panel,.main{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);backdrop-filter:blur(22px);box-shadow:0 22px 80px rgba(0,0,0,.28)}.panel{display:flex;min-height:0;flex-direction:column;overflow:hidden}.main{overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px;border-bottom:1px solid var(--line)}.head h1,.head h2,.head h3{margin:0;font-size:17px;letter-spacing:-.02em}.back{color:var(--muted);text-decoration:none;font-size:13px}.head-links{display:flex;gap:12px}.scroll{min-height:0;overflow:auto;padding:18px}.brief{display:grid;gap:12px}
    .message{border:1px solid var(--line);border-radius:var(--r);padding:13px;background:rgba(255,255,255,.06);color:var(--muted);line-height:1.55;font-size:14px}.message strong{display:block;margin-bottom:6px;color:var(--ink);font-size:13px}.input-row{display:flex;gap:8px;margin-top:auto;padding:14px;border-top:1px solid var(--line)}.input-row input{min-width:0;flex:1;border:1px solid var(--line);border-radius:var(--r);background:rgba(0,0,0,.25);color:var(--ink);padding:11px;outline:0}.input-row button,.primary,.ghost,.pill{border-radius:var(--r);padding:11px 13px}.input-row button,.primary{background:var(--gold);color:#171206;font-weight:800}.ghost,.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--ink)}.pill.active{border-color:rgba(214,168,59,.72);background:var(--gold-soft)}
    .hero{display:grid;gap:18px;padding:22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02))}.meta{display:flex;flex-wrap:wrap;gap:8px}.meta span{border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:13px}.title{display:grid;gap:10px;max-width:860px}.title p{margin:0;color:var(--muted);line-height:1.65}h1{margin:0;font-size:clamp(34px,5vw,66px);line-height:.98;letter-spacing:-.055em}.actions{display:flex;flex-wrap:wrap;gap:10px}
    .content{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(280px,.75fr);gap:14px;padding:14px}.section{border:1px solid var(--line);border-radius:var(--r);background:rgba(0,0,0,.18);overflow:hidden}.section h2{margin:0;padding:15px;border-bottom:1px solid var(--line);font-size:16px}.timeline{display:grid}.stop{display:grid;grid-template-columns:92px minmax(0,1fr) auto;gap:14px;align-items:center;padding:16px;border-bottom:1px solid var(--line)}.stop:last-child{border-bottom:0}.days{color:var(--gold);font-weight:800;font-size:13px}.stop strong{display:block;margin-bottom:6px;font-size:17px}.stop p{margin:0;color:var(--muted);line-height:1.5;font-size:14px}.score{min-width:72px;text-align:right;color:var(--muted);font-size:13px}.score b{display:block;color:var(--ink);font-size:18px}
    .facts,.bars,.departures{display:grid;gap:10px;padding:15px}.fact{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:10px;border-bottom:1px solid var(--line);color:var(--muted);font-size:14px}.fact:last-child{border-bottom:0;padding-bottom:0}.fact strong{color:var(--ink);text-align:right}.bar-row{display:grid;gap:7px;color:var(--muted);font-size:13px}.bar-label{display:flex;justify-content:space-between;gap:10px}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.bar span{display:block;height:100%;border-radius:inherit;background:var(--gold)}.note{margin:0;padding:15px;color:var(--muted);line-height:1.6;font-size:14px}.departure{border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.05);color:var(--ink);padding:13px;text-align:left}.departure strong,.departure span{display:block}.departure span{margin-top:5px;color:var(--muted);font-size:13px;line-height:1.45}.right-stack{display:grid;gap:14px}
    @media (max-width:1180px){.app{grid-template-columns:300px minmax(0,1fr)}.panel.right{grid-column:1/-1}}@media (max-width:860px){.app{grid-template-columns:1fr}.content{grid-template-columns:1fr}.stop{grid-template-columns:1fr}.score{text-align:left}}@media (max-width:560px){.shell{width:min(100% - 20px,1440px);padding:10px 0}.links{display:none}.hero{padding:18px}h1{font-size:36px}.actions,.meta{display:grid}}
  </style>
</head>
<body>
  <main class="shell">
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="home.html"><span class="mark">W</span> Wild India Journeys</a>
      <div class="links"><a href="home.html">Planner</a><a href="explore.html">Explore</a><a class="active" href="plan.html">Route draft</a><a href="itinerary.html">Costs</a></div>
    </nav>
    <section class="app">
    <aside class="panel">
      <div class="head"><h2>Safari brief</h2><span class="head-links"><a class="back" href="explore.html">Explore</a><a class="back" href="home.html">New search</a></span></div>
      <div class="scroll brief" id="brief"></div>
      <form class="input-row" id="refineForm"><input id="refineInput" placeholder="Add dates, forest, pace..." /><button type="submit">Refine</button></form>
    </aside>
    <section class="main">
      <div class="hero">
        <div class="meta" id="meta"></div>
        <div class="title"><h1 id="routeTitle">Wildlife route draft</h1><p id="routeSummary"></p></div>
        <div class="actions">
          <button class="pill active" type="button" data-style="regular">Regular</button>
          <button class="pill" type="button" data-style="luxury">Luxury</button>
          <button class="ghost" type="button" id="reverseRoute">Reverse route</button>
          <button class="ghost" type="button" id="compareCosts">Compare costs</button>
          <button class="primary" type="button" id="requestDates">Request dates</button>
        </div>
      </div>
      <div class="content">
        <section class="section"><h2>Itinerary</h2><div class="timeline" id="timeline"></div></section>
        <div class="right-stack">
          <section class="section"><h2>Route intelligence</h2><div class="facts" id="facts"></div></section>
          <section class="section"><h2>Forest fit</h2><div class="bars" id="bars"></div></section>
        </div>
      </div>
    </section>
    <aside class="panel right">
      <div class="head"><h3>Fixed departures</h3><span class="back">India</span></div>
      <div class="departures" id="departures"></div>
      <p class="note" id="advisorNote"></p>
    </aside>
    </section>
  </main>
  <script>
    const params=new URLSearchParams(window.location.search),state={query:params.get("q")||"Best tiger experience in India for 10 days in October",style:params.get("style")||"regular",month:params.get("month")||"",days:params.get("days")||"",reversed:false};
    const routeSets={tiger:{title:"10 day tiger circuit",summary:"A focused tiger route with strong sighting logic, enough time in each forest, and a buffer so the trip does not feel like a transfer marathon.",animal:"Tiger",best:"October to April",pace:"Two forest bases",stops:[["Day 1","Arrive in Jabalpur","Recover from the flight, meet the naturalist, and keep the evening light.",52],["Days 2-4","Kanha","Meadows, sal forest, hard-ground barasingha, and a measured start for tiger tracking.",68],["Days 5-8","Bandhavgarh","High tiger density, compact safari zones, and the strongest sighting push in the route.",84],["Days 9-10","Buffer and fly out","Keep one night flexible for permits, road time, or a slower lodge morning.",44]],scores:[["Bandhavgarh",84],["Kanha",68],["Tadoba",74],["Ranthambore",66]]},rhino:{title:"Assam rhino and bird route",summary:"A slower eastern India plan built around Kaziranga, river landscapes, grasslands, and high-value birding windows.",animal:"Rhino, birds",best:"November to April",pace:"One main base",stops:[["Day 1","Guwahati to Kaziranga","Drive into Assam's grassland country and settle near the central range.",48],["Days 2-5","Kaziranga","Rhino safaris, wetlands, raptors, hornbills, elephants, and early morning drives.",88],["Days 6-7","Nameri or Pobitora","Add birding, river edges, and a compact second habitat if pace allows.",70],["Day 8","Guwahati","Return with a clean airport connection and a relaxed final evening.",38]],scores:[["Kaziranga",88],["Pobitora",72],["Nameri",70],["Manas",64]]},birds:{title:"North India birding run",summary:"A bird-first route with low transfer friction, strong guide value, and space for photography-focused mornings.",animal:"Birds",best:"November to February",pace:"Short hops",stops:[["Days 1-2","Delhi to Bharatpur","Keoladeo mornings, wetlands, owls, cranes, and easy walking trails.",82],["Days 3-4","Chambal","River safari for skimmers, gharials, raptors, and clean winter light.",76],["Days 5-6","Corbett foothills","Forest birds, river edges, and a chance of larger mammals.",64],["Day 7","Delhi","Return with a simple airport connection.",34]],scores:[["Bharatpur",82],["Chambal",76],["Sattal",72],["Corbett",64]]},forest:{title:"Single forest deep dive",summary:"A precise stay built around the forest named in the brief, with best-season guidance and enough safari rounds to make the visit worthwhile.",animal:"Forest-led",best:"Depends on forest",pace:"One forest base",stops:[["Day 1","Arrive near the forest","Keep the first evening easy and confirm permits with the lodge team.",40],["Days 2-5","Core safari days","Use both morning and evening drives, rotate zones, and let the naturalist adjust daily.",72],["Day 6","Village, buffer, or second zone","Add a buffer forest, local community visit, or one quieter lodge day.",54],["Day 7","Fly out","Leave with road-time protection for airport connections.",32]],scores:[["Best zone",72],["Buffer zone",54],["Lodge time",48],["Transfers",36]]}};
    function detectRoute(query){const text=query.toLowerCase();if(text.includes("rhino")||text.includes("assam")||text.includes("kaziranga"))return"rhino";if(text.includes("bird")||text.includes("bharatpur")||text.includes("chambal"))return"birds";if(text.includes("kanha")||text.includes("bandhavgarh")||text.includes("tadoba")||text.includes("ranthambore")||text.includes("pench"))return text.includes("best tiger")||text.includes("tiger")?"tiger":"forest";return"tiger"}
    function parseDays(){const text=`${state.query} ${state.days}`.toLowerCase(),match=text.match(/(\d+)\s*(day|days|night|nights)/);return match?`${match[1]} ${match[2]}${match[1]==="1"||match[2].endsWith("s")?"":"s"}`:"Flexible"}
    function parseMonth(){const months="january february march april may june july august september october november december".split(" "),text=`${state.query} ${state.month}`.toLowerCase(),found=months.find(month=>text.includes(month));return found?found[0].toUpperCase()+found.slice(1):"Best available"}
    function stayLabel(){return state.style==="luxury"?"Luxury lodges":"Regular lodges"}function currentRoute(){const route=routeSets[detectRoute(state.query)],stops=state.reversed?[...route.stops].reverse():route.stops;return{...route,stops}}
    function render(){const route=currentRoute();document.querySelector("#routeTitle").textContent=route.title;document.querySelector("#routeSummary").textContent=route.summary;document.querySelector("#brief").innerHTML=`<div class="message"><strong>Traveler</strong>${escapeHtml(state.query)}</div><div class="message"><strong>Advisor</strong>${escapeHtml(route.summary)} ${stayLabel()} are selected for this draft.</div><div class="message"><strong>Next call</strong>Lock travel month, guest count, comfort level, and safari permit priority before quoting.</div>`;document.querySelector("#meta").innerHTML=[route.animal,parseMonth(),parseDays(),stayLabel()].map(item=>`<span>${escapeHtml(item)}</span>`).join("");document.querySelector("#timeline").innerHTML=route.stops.map(stop=>`<article class="stop"><div class="days">${escapeHtml(stop[0])}</div><div><strong>${escapeHtml(stop[1])}</strong><p>${escapeHtml(stop[2])}</p></div><div class="score"><b>${stop[3]}%</b>fit score</div></article>`).join("");document.querySelector("#facts").innerHTML=[["Best window",route.best],["Travel style",stayLabel()],["Route pace",route.pace],["Permit focus",route.animal]].map(fact=>`<div class="fact"><span>${escapeHtml(fact[0])}</span><strong>${escapeHtml(fact[1])}</strong></div>`).join("");document.querySelector("#bars").innerHTML=route.scores.map(score=>`<div class="bar-row"><div class="bar-label"><span>${escapeHtml(score[0])}</span><strong>${score[1]}%</strong></div><div class="bar"><span style="width:${score[1]}%"></span></div></div>`).join("");document.querySelector("#departures").innerHTML=departures(route.animal).map(item=>`<button class="departure" type="button" data-query="${escapeHtml(item.query)}"><strong>${escapeHtml(item.name)}</strong><span>${escapeHtml(item.detail)}</span></button>`).join("");document.querySelector("#advisorNote").textContent=advisorNote(route.animal);document.querySelectorAll("[data-style]").forEach(button=>button.classList.toggle("active",button.dataset.style===state.style))}
    function departures(animal){if(animal.includes("Rhino"))return[{name:"Kaziranga winter",detail:"January. Regular and luxury. 6 nights.",query:"January Assam departure for rhinos and birds"},{name:"Assam slow safari",detail:"February. Luxury. 8 nights.",query:"Luxury Assam rhino safari in February"}];if(animal.includes("Bird"))return[{name:"Bharatpur winter",detail:"December. Regular. 5 nights.",query:"Bird watching in Bharatpur and Chambal in December"},{name:"Chambal photo run",detail:"January. Luxury. 6 nights.",query:"Luxury birding route with Chambal in January"}];return[{name:"Bandhavgarh prime",detail:"October. Luxury. 7 nights.",query:"October luxury tiger safari in Bandhavgarh"},{name:"Tadoba and Pench",detail:"March. Regular. 6 nights.",query:"March regular tiger safari in Tadoba and Pench"},{name:"Kanha slow stay",detail:"November. Luxury. 5 nights.",query:"November luxury Kanha tiger safari"}]}
    function advisorNote(animal){if(animal.includes("Rhino"))return"Kaziranga usually rewards patience quickly, but range selection still matters. Add Nameri when birding is a serious priority.";if(animal.includes("Bird"))return"Birding trips work best with fewer hotel changes, early starts, and a guide who knows calls, light, and local movement.";return"For tiger trips, avoid changing forests too often. Two strong bases usually beat four rushed names on an itinerary."}
    function escapeHtml(value){return String(value).replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}
    function openCosts(){const params=new URLSearchParams({q:state.query,style:state.style,month:state.month,days:state.days});window.location.href=`itinerary.html?${params.toString()}`}
    document.querySelectorAll("[data-style]").forEach(button=>button.addEventListener("click",()=>{state.style=button.dataset.style;render()}));document.querySelector("#reverseRoute").addEventListener("click",()=>{state.reversed=!state.reversed;render()});document.querySelector("#compareCosts").addEventListener("click",openCosts);document.querySelector("#requestDates").addEventListener("click",()=>{document.querySelector("#advisorNote").textContent="Dates request staged. Next step: confirm month, guest count, airport city, and lodge grade before checking permits."});document.querySelector("#refineForm").addEventListener("submit",event=>{event.preventDefault();const input=document.querySelector("#refineInput"),value=input.value.trim();if(!value)return;state.query=`${state.query}. ${value}`;input.value="";render()});document.querySelector("#departures").addEventListener("click",event=>{const button=event.target.closest("[data-query]");if(!button)return;state.query=button.dataset.query;state.style=state.query.toLowerCase().includes("luxury")?"luxury":"regular";state.reversed=false;render()});render();
  </script>
</body>
</html>
